spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  jwt:
    secret: integration-test-secret-key-that-is-32-bytes-long-min
    expiration-hours: 1
    issuer: ghost-coach
    audience: ghost-coach-client
  cors:
    allowed-origins: http://localhost:5173
  storage:
    upload-dir: ./test-uploads
    max-file-size: 5MB
  gemini:
    api-key: integration-test-key
    model: gemini-1.5-flash
    base-url: http://localhost:9999
    timeout-seconds: 5
