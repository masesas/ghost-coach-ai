spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  cache:
    type: none

app:
  jwt:
    secret: test-secret-key-that-is-at-least-32-chars-long-for-hmac
    expiration-hours: 1
  storage:
    upload-dir: ./test-uploads
  gemini:
    api-key: test-key
    model: gemini-2.5-flash-lite
    base-url: http://localhost:9999
    timeout-seconds: 5
