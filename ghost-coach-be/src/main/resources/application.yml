spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:6432/ghostcoach}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONN_TIMEOUT_MS:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: caffeine
    cache-names: prompts,system-vars
    caffeine:
      spec: ${PROMPT_CACHE_SPEC:maximumSize=50,expireAfterWrite=5m}
  servlet:
    multipart:
      # Single source: APP_MAX_FILE_SIZE controls both Spring's multipart cap and the
      # in-service check in LocalStorageService (see app.storage.max-file-size below).
      max-file-size: ${APP_MAX_FILE_SIZE:5MB}
      max-request-size: ${APP_MAX_FILE_SIZE:5MB}

app:
  jwt:
    # Minimum 32 bytes (256 bits) — required for HS256 signing.
    secret: ${JWT_SECRET}
    expiration-hours: ${JWT_EXPIRATION_HOURS:2}
    issuer: ${JWT_ISSUER:ghost-coach}
    audience: ${JWT_AUDIENCE:ghost-coach-client}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
    max-file-size: ${APP_MAX_FILE_SIZE:5MB}
  gemini:
    api-key: ${GEMINI_API_KEY}
    model: gemini-2.5-flash-lite
    base-url: https://generativelanguage.googleapis.com/v1beta
    timeout-seconds: 30

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
